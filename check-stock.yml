name: Check Portasplit stock

on:
  schedule:
    # Toutes les 10 minutes. GitHub peut retarder l'exécution de quelques
    # minutes en cas de forte charge sur ses runners, c'est normal.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write   # nécessaire pour committer state.json

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock checker
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python checker.py

      - name: Commit updated state.json
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: update stock state [skip ci]"
          git push
